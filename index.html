<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">

    <title>Peer-to-Peer Expense Splitter</title>
    <!-- Add viewport meta tag for responsive design -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">


    <link rel="stylesheet" href="style.css">
</head>

<body>


    <header>
        <h1>💰 Expense Splitter</h1>
        <p>Simplify shared expenses with minimum transactions</p>
    </header>

    <div class="container">

        <div class="card">
            <h2>Add Members</h2>

       
            <input type="text" id="memberName" placeholder="Enter member name">

         
            <button onclick="addMember()">Add Member</button>

           
            <ul id="memberList"></ul>
        </div>


        <div class="card">
            <h2>Add Expense</h2>

        
            <label for="payer">Payer</label>
            <select id="payer" title="Payer"></select>

        
            <label>Amount</label>
            <input type="number" id="amount" placeholder="Enter amount">

    
            <button onclick="addExpense()">Add Expense</button>
        </div>


        <div class="card">
            <h2>Balances</h2>
            <ul id="balances"></ul>
        </div>

        <div class="card">
            <h2>Debt Simplification</h2>


            <button onclick="simplify()">Simplify Debts</button>

            <ul id="results"></ul>
        </div>

    </div>

    <script src="script.js"></script>
</body>

</html>
